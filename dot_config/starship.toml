"$schema" = 'https://starship.rs/config-schema.json'

palette = "catppuccin_macchiato"

format = """
$directory\
[│](surface2) \
$git_branch\
$git_status\
$direnv\
$nodejs\
$golang\
$python\
$rust\
 $fill \
$docker_context\
$kubernetes\
$aws\
$cmd_duration\
$time\
$line_break\
$character"""

add_newline = false

# ── Prompt character ──────────────────────────────────────────────
[character]
success_symbol = "[❯](peach)"
error_symbol = "[❯](red)"
vimcmd_symbol = "[❮](subtext1)"

# ── Directory ─────────────────────────────────────────────────────
[directory]
style = "bold lavender"
truncation_length = 3
truncation_symbol = "…/"
read_only = " 󰌾"
read_only_style = "red"
format = "[$read_only]($read_only_style)[$path]($style) "

# ── Git ───────────────────────────────────────────────────────────
[git_branch]
format = "[$symbol$branch(:$remote_branch)]($style) "
symbol = " "
style = "bold mauve"
truncation_length = 24

[git_status]
format = '([$staged](green)[$modified](peach)[$untracked](lavender)[$deleted](red)[$renamed](sky)[$stashed](surface2)[$conflicted](maroon)[$ahead_behind](sky) )'
conflicted = "=$count "
ahead = "⇡${count} "
behind = "⇣${count} "
diverged = "⇕⇡${ahead_count}⇣${behind_count} "
untracked = "?${count} "
stashed = "\\$${count} "
modified = "!${count} "
staged = "+${count} "
renamed = "»${count} "
deleted = "✘${count} "

# ── Fill ──────────────────────────────────────────────────────────
[fill]
symbol = "─"
style = "surface1"

# ── Docker ────────────────────────────────────────────────────────
[docker_context]
format = "[ $symbol$context]($style) [│](surface2) "
symbol = " "
style = "sapphire"
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "compose.yml", "compose.yaml", "Dockerfile"]

# ── Kubernetes ────────────────────────────────────────────────────
[kubernetes]
disabled = false
format = '[$symbol$context( \($namespace\))]($style) [│](surface2) '
symbol = "󱃾 "
style = "blue"
detect_folders = []
detect_files = []

# Strip EKS ARNs down to just the cluster name
[[kubernetes.contexts]]
context_pattern = 'arn:aws:eks:[\w-]+:\d+:cluster/(?P<cluster>[\w-]+)'
context_alias = '$cluster'

# ── AWS ───────────────────────────────────────────────────────────
[aws]
format = '[$symbol$profile]($style) [│](surface2) '
symbol = " "
style = "yellow"

[aws.region_aliases]
us-east-1 = "use1"
us-east-2 = "use2"
us-west-1 = "usw1"
us-west-2 = "usw2"

# ── Command duration ──────────────────────────────────────────────
[cmd_duration]
format = "[$duration]($style) [│](surface2) "
style = "overlay1"
min_time = 2_000
show_milliseconds = false

# ── Time (anchors the right side) ─────────────────────────────────
[time]
disabled = false
format = "[$time]($style) "
style = "overlay2"
time_format = "%H:%M"

# ── Direnv (shows when .envrc is loaded) ──────────────────────────
[direnv]
disabled = false
format = '[$symbol$allowed]($style) '
symbol = " "
style = "teal"
allowed_msg = ""
not_allowed_msg = "!"
denied_msg = "✘"

# ── Language runtimes (only show when detected) ───────────────────
[nodejs]
format = "[│](surface2) [$symbol$version]($style) "
symbol = " "
style = "green"

[golang]
format = "[│](surface2) [$symbol$version]($style) "
symbol = " "
style = "sky"

[python]
format = "[│](surface2) [$symbol$version]($style) "
symbol = " "
style = "yellow"

[rust]
format = "[│](surface2) [$symbol$version]($style) "
symbol = " "
style = "peach"

[elixir]
format = "[│](surface2) [$symbol$version]($style) "
symbol = " "
style = "lavender"

[package]
disabled = true

# ── Catppuccin Macchiato palette ──────────────────────────────────
[palettes.catppuccin_macchiato]
rosewater = "#f4dbd6"
flamingo = "#f0c6c6"
pink = "#f5bde6"
mauve = "#c6a0f6"
red = "#ed8796"
maroon = "#ee99a0"
peach = "#f5a97f"
yellow = "#eed49f"
green = "#a6da95"
teal = "#8bd5ca"
sky = "#91d7e3"
sapphire = "#7dc4e4"
blue = "#8aadf4"
lavender = "#b7bdf8"
text = "#cad3f5"
subtext1 = "#b8c0e0"
subtext0 = "#a5adcb"
overlay2 = "#939ab7"
overlay1 = "#8087a2"
overlay0 = "#6e738d"
surface2 = "#5b6078"
surface1 = "#494d64"
surface0 = "#363a4f"
base = "#24273a"
mantle = "#1e2030"
crust = "#181926"
