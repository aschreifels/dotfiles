# ── Language Server Definitions ──────────────────────────────────────
[language-server.lsp-ai]
command = "lsp-ai"
args = ["--stdio"]

[language-server.lsp-ai.config.memory]
file_store = {}

[language-server.lsp-ai.config.models.zeta]
type = "open_ai"
completions_endpoint = "http://localhost:1337/v1/completions"
model = "zed-industries/zeta"
auth_token = "NOT_NEEDED"
max_requests_per_second = 2

[language-server.lsp-ai.config.completion]
model = "zeta"

[language-server.lsp-ai.config.completion.parameters]
max_context = 2048
max_tokens = 128
fim = { start = "<fim_prefix>", middle = "<fim_suffix>", end = "<fim_middle>" }

[language-server.ruff]
command = "ruff-lsp"

[language-server.pyright]
command = "pyright-langserver"
args = ["--stdio"]

[language-server.vtsls]
command = "vtsls"
args = ["--stdio"]

[language-server.vtsls.config.typescript.suggest]
completeFunctionCalls = true

[language-server.vtsls.config.typescript.inlayHints]
parameterNames = { enabled = "all" }
parameterTypes = { enabled = true }
variableTypes = { enabled = true }
propertyDeclarationTypes = { enabled = true }
functionLikeReturnTypes = { enabled = true }
enumMemberValues = { enabled = true }

[language-server.vtsls.config.javascript.inlayHints]
parameterNames = { enabled = "all" }
parameterTypes = { enabled = true }
variableTypes = { enabled = true }
propertyDeclarationTypes = { enabled = true }
functionLikeReturnTypes = { enabled = true }
enumMemberValues = { enabled = true }

[language-server.vscode-css-language-server]
command = "vscode-css-language-server"
args = ["--stdio"]

[language-server.vscode-css-language-server.config]
provideFormatter = true

[language-server.vscode-html-language-server]
command = "vscode-html-language-server"
args = ["--stdio"]

[language-server.vscode-json-language-server]
command = "vscode-json-language-server"
args = ["--stdio"]

[language-server.vscode-json-language-server.config.json]
validate = { enable = true }

[language-server.yaml-language-server]
command = "yaml-language-server"
args = ["--stdio"]

[language-server.yaml-language-server.config.yaml]
validation = true
completion = true

[language-server.gopls]
command = "gopls"
args = ["serve"]

[language-server.gopls.config.hints]
assignVariableTypes = true
compositeLiteralFields = true
constantValues = true
functionTypeParameters = true
parameterNames = true
rangeVariableTypes = true

[language-server.docker-langserver]
command = "docker-langserver"
args = ["--stdio"]

# ── Language Assignments ────────────────────────────────────────────

[[language]]
name = "typescript"
language-servers = ["vtsls", "lsp-ai"]
formatter = { command = "prettier", args = ["--parser", "typescript"] }
auto-format = true

[[language]]
name = "javascript"
language-servers = ["vtsls", "lsp-ai"]
formatter = { command = "prettier", args = ["--parser", "babel"] }
auto-format = true

[[language]]
name = "tsx"
language-servers = ["vtsls", "lsp-ai"]
formatter = { command = "prettier", args = ["--parser", "typescript"] }
auto-format = true

[[language]]
name = "jsx"
language-servers = ["vtsls", "lsp-ai"]
formatter = { command = "prettier", args = ["--parser", "babel"] }
auto-format = true

[[language]]
name = "json"
language-servers = ["vscode-json-language-server", "lsp-ai"]
formatter = { command = "prettier", args = ["--parser", "json"] }
auto-format = true

[[language]]
name = "jsonc"
language-servers = ["vscode-json-language-server", "lsp-ai"]

[[language]]
name = "html"
language-servers = ["vscode-html-language-server", "lsp-ai"]
formatter = { command = "prettier", args = ["--parser", "html"] }
auto-format = true

[[language]]
name = "css"
language-servers = ["vscode-css-language-server", "lsp-ai"]
formatter = { command = "prettier", args = ["--parser", "css"] }
auto-format = true

[[language]]
name = "scss"
language-servers = ["vscode-css-language-server", "lsp-ai"]
formatter = { command = "prettier", args = ["--parser", "scss"] }
auto-format = true

[[language]]
name = "yaml"
language-servers = ["yaml-language-server", "lsp-ai"]

[[language]]
name = "go"
language-servers = ["gopls", "lsp-ai"]
auto-format = true

[[language]]
name = "gomod"
language-servers = ["gopls", "lsp-ai"]

[[language]]
name = "gowork"
language-servers = ["gopls", "lsp-ai"]

[[language]]
name = "gotmpl"
language-servers = ["gopls", "lsp-ai"]

[[language]]
name = "markdown"
formatter = { command = "prettier", args = ["--parser", "markdown"] }
auto-format = true
soft-wrap.enable = true

[[language]]
name = "dockerfile"
language-servers = ["docker-langserver", "lsp-ai"]

# ─── Elixir ──────────────────────────────────────────────────────────────────
# elixir-ls is Helix's built-in default so no [language-server] block needed
# unless your binary is in a non-standard location

[[language]]
name = "elixir"
language-servers = ["elixir-ls", "lsp-ai"]

# ─── Python ──────────────────────────────────────────────────────────────────


[[language]]
name = "python"
language-servers = ["pyright", "ruff", "lsp-ai"]
